<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="./style/bmi.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="bmi-container">
    <h2>BMI Calculator</h2>

    <form>
        <label for="height">Height (cm)</label><br>
        <input type="number" id="height" name="height" placeholder="Enter height" required><br><br>

        <label for="weight">Weight (kg)</label><br>
        <input type="number" id="weight" name="weight" placeholder="Enter weight" required><br><br>

        <button type="submit">Calculate BMI</button>
    </form>

    <div class="result">
        <h3>Your BMI: --</h3>
        <p>Status: --</p>
    </div>
</div>
<script src="./logic/bmi.js"></script>
</body>
</html>
