<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Page</title>
    <link rel="stylesheet" href="./style/login.css">
</head>
<body>
    <div class="auth-container">
        <h2>Welcome to Saludify</h2>
        <!-- Toggle buttons -->
           <div class="toggle">
            <button id="btn-login">Login</button>
            <button id="btn-signup">SignUp</button>
           </div>

           <!--Login Form -->
           <div class="login-section" id="loginSection">
            <h3>Login</h3>
            <form id="loginForm">
              <label>Email</label><br>
              <input type="email" placeholder="Enter Email" required><br><br>

              <label>Password</label><br>
              <input type="password" placeholder="Enter Password" required><br><br>

              <button type="submit">Login</button>
            </form>
    </div>
          <hr><br>

    <!--SignUp Form-->
    <div class="signup-section" id="signupSection">
        <h3>Signup</h3>

        <form id="signupForm">
            <label>Full Name</label><br>
            <input type="text" placeholder="Enter Name" required><br><br>

            <label>Email</label>
            <input type="email" placeholder="Enter Email" required><br><br>

            <label>Password</label><br>
            <input type="password" placeholder="Create Password" required><br><br>

            <label>Confirm Password</label><br>
            <input type="password" placeholder="Confirm Password" required><br><br>

            <button type="submit">Sign Up</button>
        </form>
    </div>
</div>

<script src="./logic/login.js"></script>
</body>
</html>
